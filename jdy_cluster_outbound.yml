title: JDY Botnet Control Cluster Outbound Connection
id: b2d4f6a8-1c3e-4f9b-8a2d-5e7c9b1a3d22
status: experimental
description: >
  Detects outbound connections from internal assets to known JDY control-cluster hosts
  (relays and the payload/tasking host). JDY relays rotate, so treat IP matches as leads and
  prioritize the jdyfj certificate and behavioral signals. Especially significant when the
  source is an internet-facing edge device (router, firewall, VPN, IoT).
references:
  - https://github.com/yankywilson/jdy-tasking-decryption
author: JDY Investigation
date: 2026/06/24
tags:
  - attack.command-and-control
  - attack.t1071.001
  - attack.t1090
  - attack.g1017
logsource:
  category: firewall
detection:
  selection_cluster:
    dst_ip:
      - '216.173.65.250'
      - '194.14.217.88'
      - '23.27.120.240'
      - '109.104.154.116'
      - '149.248.3.38'
  selection_historical:
    dst_ip:
      - '140.82.23.123'
  condition: selection_cluster or selection_historical
falsepositives:
  - Relays sit on shared VPS providers (Evoxt, M247, Vultr); coincidental contact with a
    co-tenant is possible. The historical anchor (140.82.23.123) rotated to Cloudflare and may
    now front unrelated services - corroborate before acting.
level: high
